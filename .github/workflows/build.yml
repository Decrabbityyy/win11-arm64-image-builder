name: Build Win11 ARM64 Image

on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Windows 11 ARM64 ISO 下载直链'
        required: true
      image_index:
        description: 'install.wim 镜像索引 (1=家庭版, 2=专业版等，默认1)'
        required: false
        default: '1'
      enable_qcow2_compress:
        description: '启用 qemu-img -c 内部压缩（减小体积，增加构建时间）'
        required: false
        default: true
        type: boolean
      compress_level:
        description: '7-Zip 压缩等级 (1=最快, 5=推荐平衡, 9=最高压缩)'
        required: false
        default: '5'

jobs:
  build:
    runs-on: windows-latest      # Windows Server 2025 (20260628)
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - name: 生成日期标识
        id: date
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          "date=$date" >> $env:GITHUB_OUTPUT
          Write-Host "Build date: $date"

      - name: 下载 ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          aria2c -x 16 -s 16 -k 1M --console-log-level=error -o win11.iso "${{ inputs.iso_url }}"
          if (-not (Test-Path win11.iso)) { throw "ISO 下载失败" }

      - name: 安装 qemu-img
        shell: pwsh
        run: |
          choco install qemu-img -y --no-progress
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          qemu-img --version

      - name: 执行构建
        shell: pwsh
        env:
          SRC_ISO:        "./win11.iso"
          OUT_QCOW:       "win11-arm64-${{ steps.date.outputs.date }}.qcow2"
          IMAGE_INDEX:    ${{ inputs.image_index }}
          COMPRESS:       ${{ inputs.enable_qcow2_compress && 'true' || '' }}
          DRIVERS_DIR:    "https://github.com/HuJK/gunyah-guest-drivers-windows/releases/download/dev/gunyah-arm64-drivers.zip"
          DVM_USERNAME:   "droidvm"
          DVM_PASSWORD:   "DroidVM"
          SSH_PUBKEY:     ""
          DISK_SIZE_MB:   "40960"
          DRIVER_DIR:     "ZIP/drivers"
          DRIVER_INSTALL: "NetKVM rdmpool pvmpower vioinput viostor vioscsi"
          DRIVER_CERT:    "ZIP/DroidVM_Test.cer"
          OPENSSH_SRC:    "https://github.com/PowerShell/Win32-OpenSSH/releases/download/10.0.0.0p2-Preview/OpenSSH-ARM64-v10.0.0.0.msi"
        run: |
          $ErrorActionPreference = 'Stop'
          .\windows\build.ps1

      - name: 7-Zip 压缩产物
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $base = "win11-arm64-${{ steps.date.outputs.date }}"
          $qcow = "$base.qcow2"
          $final = "$base.qcow2.7z"
          if (-not (Test-Path $qcow)) { throw "未找到 $qcow" }
          Write-Host "7-Zip compression (level ${{ inputs.compress_level }})..."
          7z a -mx=${{ inputs.compress_level }} -m0=LZMA2 $final $qcow

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: win11-arm64-${{ steps.date.outputs.date }}
          path: "*.7z"
          if-no-files-found: error
          retention-days: 30
